<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>시작 페이지</h1>
    <div>
        <h1>로그인</h1>
        id: <input type="text" id="id"><br>
        pw: <input type="password" id="pw"><br>
        <button id="loginBtn">로그인</button>
    </div>
    <div>
        <h2>로그인 이후 보여 주는 메뉴</h2>
        <a href="#" id="userCheck">user data</a>
        <a href="#" id="managerCheck">manager data</a>
        <a href="#" id="adminCheck">admin data</a>
    </div>
    <div id="message">
        메뉴 누르면 변경되는 데이터 또는 디자인 뿌리는 곳
    </div>
    <script>
        function loginHandling(){
            let id = document.querySelector("#id");
            let pw = document.querySelector("#pw");
            // console.log(id, pw);
            let message = 'OK';
            axios.post('http://192.168.0.67:8882/login', {
                username: id.value, //key값에 "" 안 넣어도 됨
                password: pw.value
            })
                .then(response => {
                    console.log(response);
                    //유지 - 1. 메모리, 2. 쿠키, 3. 다른 저장소 ....
                    sessionStorage.au = response.headers.authorization;
                    //localStorage.au = response.headers.authorization;
                })
                .catch(error => {
                    console.log(error);
                    })
            //로그인 UI 비활성화, 숨김
            id.value="";
            pw.value="";
            document.querySelector('#message').innerHTML=message;

        }
        document.querySelector("#loginBtn").addEventListener("click", loginHandling);

        function userCheckHandling(){
            axios.get('http://127.0.0.1:8882/api/jwt/user', {
                headers : {
                    "Authorization" : sessionStorage.au
                }
            })
                .then(response => {
                    console.log(response);
                    document.querySelector('#message').innerHTML = response.data.message;
                })
                .catch(error => {
                    document.querySelector('#message').innerHTML = "로그인 필수";
                    console.log(error);
                });
        }
        document.querySelector("#userCheck").addEventListener("click", userCheckHandling);

        function managerCheckHandling(){
            axios.get('http://127.0.0.1:8882/api/jwt/manager', {
                headers : {
                    "Authorization" : sessionStorage.au
                }
            })
                .then(response => {
                    console.log(response);
                    document.querySelector('#message').innerHTML = response.data.message;
                })
                .catch(error => {
                    document.querySelector('#message').innerHTML = "manager 로그인 필수";
                    console.log(error);
                });
        }
        document.querySelector("#managerCheck").addEventListener("click", managerCheckHandling);

        function adminCheckHandling(){
            axios.get('http://127.0.0.1:8882/api/jwt/admin', {
                headers : {
                    "Authorization" : sessionStorage.au
                }
            })
                .then(response => {
                    console.log(response);
                    document.querySelector('#message').innerHTML = response.data.message;
                })
                .catch(error => {
                    document.querySelector('#message').innerHTML = "admin 로그인 필수";
                    console.log(error);
                });
        }
        document.querySelector("#adminCheck").addEventListener("click", adminCheckHandling);
    </script>
</body>
</html>
