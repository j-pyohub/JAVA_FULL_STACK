<!DOCTYPE html>
<html>
<head>
<script type="text/javascript">
	console.log(1234);
	console.log(1234, "jeon", ["A"], {name:"홍길동"});
	
	var u1 = function(){
		console.log(u1);
	}

	var u1 = function(name){
		console.log(u1, name); //오버라이딩
	}
	
	u1();
	
	//시간을 입력 받아서, 해당 메시지를 출력 - 매개인자 변수를 굳이 넣는 이유는 가독성 때문)
	var timeMessage = function(inputTime){
		//
		if (arguments.length >= 2)
			inputTime = arguments[arguments.length-1];
		if (typeof inputTime == 'undefined')
			inputTime = 9;
		return inputTime + "시 입니다.";
	};
	
	console.log(timeMessage(10)); //정식 코드
	console.log(timeMessage()); //기본 처리
	console.log(timeMessage(1,2,3,4,5));
	console.dir(console.log)
	
</script>
