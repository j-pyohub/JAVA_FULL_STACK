<!-- 표수정 -->
<!-- 두 수를 입력받아서 구구단 출력 -->
<!DOCTYPE html>
<html>
<head>
<script>
	let number1 = 3;
	let number2 = 5;
	let message = "";
	
	if (number1>=2 && number1<=9){
		if(number2>=number1 && number2<=9){
		for (var j = number1; j <= number2; j++) {
			message += "<div>";
			for (var i = 1; i <= 9; i++){
				message += "<span>" + j + "*" + i + "=" +  i * j + "  </span>";
			}
			message += "</div>";
			} 
		} else message = "두번째 숫자는 첫번째숫자보타 크고 9까지"
	} else
		message = "첫번째 숫자 2부터 9까지"
		
	document.write(message);

</script>
</head>
<body>

</body>
</html>
